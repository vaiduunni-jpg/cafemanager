<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Shop Income Report</title>
  <style>
    body { font-family: Arial, sans-serif; margin:20px; }
    h1, h2 { margin: 0.5em 0 0.2em 0;}
    table { border-collapse: collapse; width: 100%; margin-bottom: 1em;}
    th, td { border: 1px solid #999; padding: 4px 8px; text-align: right; }
    th { background: #ececec; font-weight: bold; }
    .section { margin-bottom: 1.5em; }
    .center { text-align: center; }
    .footer { font-size: small; text-align: center; margin-top: 2em; color: #888; }
  </style>
</head>
<body>
  <h1 class="center">Income Report</h1>
  <p class="center"><?= fromDate ?> to <?= toDate ?></p>
  <p class="center">Generated: <?= generatedOn ?></p>

  <div class="section">
    <h2>Summary</h2>
    <table>
      <tr>
        <th>Total Collection</th>
        <th>Online</th>
        <th>Cash</th>
        <th>Remittance</th>
      </tr>
      <tr>
        <td><?= total.toFixed(2) ?></td>
        <td><?= online.toFixed(2) ?></td>
        <td><?= cash.toFixed(2) ?></td>
        <td><?= remit.toFixed(2) ?></td>
      </tr>
    </table>
  </div>

  <div class="section">
    <h2>Day-wise Details</h2>
    <table>
      <tr>
        <th>Date</th>
        <th>Total</th>
        <th>Online</th>
        <th>Cash</th>
        <th>Remittance</th>
      </tr>
      <? for (var i=0; i<rows.length; i++) { ?>
        <tr>
          <td style="text-align:left"><?= rows[i].date ?></td>
          <td><?= rows[i].total.toFixed(2) ?></td>
          <td><?= rows[i].online.toFixed(2) ?></td>
          <td><?= rows[i].cash.toFixed(2) ?></td>
          <td><?= rows[i].remit.toFixed(2) ?></td>
        </tr>
      <? } ?>
    </table>
  </div>

  <div class="footer">Generated by <?= generatedBy ?> on <?= generatedOn ?></div>
</body>
</html>
